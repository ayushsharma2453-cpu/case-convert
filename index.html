<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Case Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Advanced Case Converter</h1>

    <textarea id="inputText" placeholder="Type or paste your text here"></textarea>

    <div class="buttons">
        <button onclick="convertCase('sentence')">Sentence case</button>
        <button onclick="convertCase('lower')">lower case</button>
        <button onclick="convertCase('upper')">UPPER CASE</button>
        <button onclick="convertCase('capitalize')">Capitalized Case</button>
        <button onclick="convertCase('alternate')">aLtErNaTiNg cAsE</button>
        <button onclick="convertCase('title')">Title Case</button>
        <button onclick="convertCase('inverse')">InVeRsE CaSe</button>
        <button onclick="downloadText()">Download</button>
        <button onclick="copyText()">Copy</button>
        <button onclick="clearText()">Clear</button>
    </div>

    <div class="stats">
        <p>Characters: <span id="charCount">0</span></p>
        <p>Words: <span id="wordCount">0</span></p>
        <p>Sentences: <span id="sentenceCount">0</span></p>
        <p>Lines: <span id="lineCount">0</span></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
